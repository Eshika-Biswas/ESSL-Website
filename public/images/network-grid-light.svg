<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.6" />
    </radialGradient>
    
    <!-- Node Gradients -->
    <radialGradient id="nodeBlue" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </radialGradient>

    <radialGradient id="nodeTeal" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </radialGradient>

    <radialGradient id="nodePurple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </radialGradient>

    <radialGradient id="nodePink" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </radialGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)" />

  <!-- Network Grid Connections -->
  <g stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1.5">
    <!-- Outer web -->
    <line x1="150" y1="200" x2="350" y2="150" />
    <line x1="150" y1="200" x2="200" y2="400" />
    <line x1="350" y1="150" x2="500" y2="300" />
    <line x1="200" y1="400" x2="500" y2="300" />
    <line x1="200" y1="400" x2="180" y2="650" />
    <line x1="500" y1="300" x2="680" y2="200" />
    
    <!-- Center web -->
    <line x1="680" y1="200" x2="850" y2="350" />
    <line x1="500" y1="300" x2="600" y2="550" />
    <line x1="600" y1="550" x2="850" y2="350" />
    <line x1="600" y1="550" x2="450" y2="750" />
    <line x1="180" y1="650" x2="450" y2="750" />
    
    <!-- Right web -->
    <line x1="850" y1="350" x2="1100" y2="250" />
    <line x1="850" y1="350" x2="950" y2="600" />
    <line x1="950" y1="600" x2="1100" y2="250" />
    <line x1="950" y1="600" x2="1250" y2="500" />
    <line x1="1100" y1="250" x2="1300" y2="380" />
    <line x1="1250" y1="500" x2="1300" y2="380" />
    <line x1="950" y1="600" x2="800" y2="800" />
    <line x1="450" y1="750" x2="800" y2="800" />
    <line x1="1250" y1="500" x2="1150" y2="750" />
    <line x1="800" y1="800" x2="1150" y2="750" />
  </g>

  <!-- Secondary subtle connections -->
  <g stroke="#8b5cf6" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4,4">
    <line x1="150" y1="200" x2="500" y2="300" />
    <line x1="350" y1="150" x2="680" y2="200" />
    <line x1="200" y1="400" x2="450" y2="750" />
    <line x1="600" y1="550" x2="800" y2="800" />
    <line x1="850" y1="350" x2="1250" y2="500" />
    <line x1="1100" y1="250" x2="1250" y2="500" />
    <line x1="950" y1="600" x2="1150" y2="750" />
  </g>

  <!-- Network Nodes with glowing halos -->
  <g id="nodes">
    <!-- Node 1: Purple -->
    <circle cx="150" cy="200" r="14" fill="#a78bfa" opacity="0.1" filter="url(#glow)" />
    <circle cx="150" cy="200" r="7" fill="url(#nodePurple)" />
    
    <!-- Node 2: Blue -->
    <circle cx="350" cy="150" r="16" fill="#93c5fd" opacity="0.1" filter="url(#glow)" />
    <circle cx="350" cy="150" r="9" fill="url(#nodeBlue)" />
    
    <!-- Node 3: Teal -->
    <circle cx="200" cy="400" r="12" fill="#99f6e4" opacity="0.1" filter="url(#glow)" />
    <circle cx="200" cy="400" r="6" fill="url(#nodeTeal)" />

    <!-- Node 4: Blue (Large center) -->
    <circle cx="500" cy="300" r="24" fill="#93c5fd" opacity="0.15" filter="url(#glow)" />
    <circle cx="500" cy="300" r="13" fill="url(#nodeBlue)" />

    <!-- Node 5: Pink -->
    <circle cx="680" cy="200" r="14" fill="#fbcfe8" opacity="0.1" filter="url(#glow)" />
    <circle cx="680" cy="200" r="8" fill="url(#nodePink)" />

    <!-- Node 6: Teal (Large) -->
    <circle cx="600" cy="550" r="22" fill="#99f6e4" opacity="0.15" filter="url(#glow)" />
    <circle cx="600" cy="550" r="12" fill="url(#nodeTeal)" />

    <!-- Node 7: Purple -->
    <circle cx="180" cy="650" r="16" fill="#a78bfa" opacity="0.1" filter="url(#glow)" />
    <circle cx="180" cy="650" r="9" fill="url(#nodePurple)" />

    <!-- Node 8: Blue -->
    <circle cx="450" cy="750" r="12" fill="#93c5fd" opacity="0.1" filter="url(#glow)" />
    <circle cx="450" cy="750" r="6" fill="url(#nodeBlue)" />

    <!-- Node 9: Purple (Large center-right) -->
    <circle cx="850" cy="350" r="26" fill="#a78bfa" opacity="0.15" filter="url(#glow)" />
    <circle cx="850" cy="350" r="14" fill="url(#nodePurple)" />

    <!-- Node 10: Teal -->
    <circle cx="1100" cy="250" r="14" fill="#99f6e4" opacity="0.1" filter="url(#glow)" />
    <circle cx="1100" cy="250" r="8" fill="url(#nodeTeal)" />

    <!-- Node 11: Pink (Large) -->
    <circle cx="950" cy="600" r="22" fill="#fbcfe8" opacity="0.15" filter="url(#glow)" />
    <circle cx="950" cy="600" r="11" fill="url(#nodePink)" />

    <!-- Node 12: Blue -->
    <circle cx="1250" cy="500" r="16" fill="#93c5fd" opacity="0.1" filter="url(#glow)" />
    <circle cx="1250" cy="500" r="9" fill="url(#nodeBlue)" />

    <!-- Node 13: Purple -->
    <circle cx="1300" cy="380" r="12" fill="#a78bfa" opacity="0.1" filter="url(#glow)" />
    <circle cx="1300" cy="380" r="6" fill="url(#nodePurple)" />

    <!-- Node 14: Teal -->
    <circle cx="800" cy="800" r="14" fill="#99f6e4" opacity="0.1" filter="url(#glow)" />
    <circle cx="800" cy="800" r="7" fill="url(#nodeTeal)" />

    <!-- Node 15: Pink -->
    <circle cx="1150" cy="750" r="14" fill="#fbcfe8" opacity="0.1" filter="url(#glow)" />
    <circle cx="1150" cy="750" r="8" fill="url(#nodePink)" />
  </g>

  <!-- Pulsing waves / data streams -->
  <path d="M-100,450 C300,300 500,600 900,450 C1200,350 1300,550 1600,450" fill="none" stroke="url(#nodeBlue)" stroke-opacity="0.05" stroke-width="8" />
  <path d="M-100,500 C300,350 500,650 900,500 C1200,400 1300,600 1600,500" fill="none" stroke="url(#nodeTeal)" stroke-opacity="0.04" stroke-width="6" />
</svg>
