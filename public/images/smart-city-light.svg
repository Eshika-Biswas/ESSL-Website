<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#eff6ff" />
    </linearGradient>
    
    <!-- Building Gradient -->
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.01" />
    </linearGradient>

    <!-- Glowing Lines -->
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="lineGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0" />
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)" />

  <!-- City Skyline Silhouette Grid -->
  <g id="buildings">
    <!-- Left side buildings -->
    <rect x="50" y="550" width="120" height="350" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
    <rect x="200" y="450" width="90" height="450" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
    <rect x="320" y="600" width="140" height="300" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
    
    <!-- Center buildings -->
    <rect x="500" y="400" width="160" height="500" rx="6" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5" />
    <rect x="680" y="300" width="110" height="600" rx="6" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5" />
    <polygon points="680,300 735,220 790,300" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5" />
    <rect x="820" y="480" width="150" height="420" rx="6" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5" />

    <!-- Right side buildings -->
    <rect x="1000" y="580" width="100" height="320" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
    <rect x="1130" y="500" width="120" height="400" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
    <rect x="1280" y="620" width="110" height="280" rx="4" fill="url(#buildGrad)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1" />
  </g>

  <!-- Connection Grid and Nodes -->
  <g id="grid-connections">
    <!-- Network Lines -->
    <path d="M 100 700 L 245 650 L 390 750 L 580 600 L 735 550 L 895 680 L 1050 720 L 1190 620 L 1335 760" fill="none" stroke="url(#lineGrad1)" stroke-width="2" />
    <path d="M 245 450 L 580 400 L 735 220 L 895 480 L 1190 500" fill="none" stroke="url(#lineGrad2)" stroke-width="2.5" />
    
    <!-- Vertical Uplinks -->
    <line x1="245" y1="650" x2="245" y2="450" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="580" y1="600" x2="580" y2="400" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="735" y1="550" x2="735" y2="220" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="895" y1="680" x2="895" y2="480" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="1190" y1="620" x2="1190" y2="500" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="5,5" />

    <!-- Connecting Diagonals -->
    <line x1="100" y1="700" x2="245" y2="450" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1" />
    <line x1="390" y1="750" x2="580" y2="400" stroke="#06b6d4" stroke-opacity="0.15" stroke-width="1" />
    <line x1="580" y1="600" x2="735" y2="220" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.2" />
    <line x1="735" y1="220" x2="895" y2="680" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="1.2" />
    <line x1="895" y1="480" x2="1050" y2="720" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1" />

    <!-- Pulsing Node Dots (Cyan / Blue) -->
    <circle cx="245" cy="650" r="5" fill="#3b82f6" opacity="0.8" />
    <circle cx="245" cy="650" r="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4" />

    <circle cx="245" cy="450" r="6" fill="#06b6d4" opacity="0.9" />
    <circle cx="245" cy="450" r="12" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5" />

    <circle cx="390" cy="750" r="4" fill="#3b82f6" opacity="0.7" />

    <circle cx="580" cy="600" r="5" fill="#06b6d4" opacity="0.8" />

    <circle cx="580" cy="400" r="7" fill="#3b82f6" opacity="0.9" />
    <circle cx="580" cy="400" r="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" />

    <!-- Center Pinnacle Node -->
    <circle cx="735" cy="220" r="8" fill="#3b82f6" opacity="1" />
    <circle cx="735" cy="220" r="16" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
    <circle cx="735" cy="220" r="24" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4" />

    <circle cx="735" cy="550" r="6" fill="#06b6d4" opacity="0.8" />

    <circle cx="895" cy="480" r="7" fill="#3b82f6" opacity="0.9" />
    <circle cx="895" cy="480" r="14" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4" />

    <circle cx="895" cy="680" r="5" fill="#06b6d4" opacity="0.8" />

    <circle cx="1190" cy="500" r="6" fill="#3b82f6" opacity="0.9" />
    <circle cx="1190" cy="500" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" />

    <circle cx="1190" cy="620" r="4" fill="#06b6d4" opacity="0.7" />
  </g>

  <!-- Abstract Tech Grid (Horizontal & Perspective Lines) -->
  <g id="base-grid" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1">
    <!-- Perspective grid lines converging to center bottom -->
    <line x1="-100" y1="900" x2="720" y2="600" />
    <line x1="200" y1="900" x2="720" y2="600" />
    <line x1="500" y1="900" x2="720" y2="600" />
    <line x1="800" y1="900" x2="720" y2="600" />
    <line x1="1100" y1="900" x2="720" y2="600" />
    <line x1="1400" y1="900" x2="720" y2="600" />
    <line x1="1700" y1="900" x2="720" y2="600" />

    <!-- Horizontal grid lines -->
    <line x1="0" y1="650" x2="1440" y2="650" />
    <line x1="0" y1="700" x2="1440" y2="700" stroke-opacity="0.06" />
    <line x1="0" y1="760" x2="1440" y2="760" stroke-opacity="0.08" />
    <line x1="0" y1="830" x2="1440" y2="830" stroke-opacity="0.1" />
  </g>
</svg>
